<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Social MVP | Glass & Dark</title>

    <!-- Подключение шрифтов и иконок -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel для JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons (для работы иконок в React) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Стилизация скроллбара для премиального вида */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2); 
        }

        /* Анимация появления сообщений */
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-enter {
            animation: slideInUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b; /* Zinc-950 */
            color: white;
            overflow: hidden; /* Чтобы скроллил только контент */
        }

        /* Эффект Liquid Glass */
        .glass-panel {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .glass-header {
            background: rgba(30, 30, 35, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Градиентный акцент */
        .accent-text {
            background: linear-gradient(90deg, #a78bfa 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1', // Indigo 500
                        darkbg: '#09090b',  // Zinc 950
                        surface: '#18181b', // Zinc 900
                        muted: '#a1a1aa'    // Zinc 400
                    }
                }
            }
        }
    </script>
</head>
<body class="h-screen w-full flex items-center justify-center">

    <div id="root" class="w-full h-full max-w-[500px] sm:max-w-[600px] glass-panel rounded-3xl overflow-hidden relative flex flex-col shadow-2xl"></div>

    <!-- React App Root -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- MOCK DATA ---
        const CURRENT_USER = {
            id: 1, name: "Alex Design", avatar: "https://images.unsplash.com/photo-1534528741775-53944b0c1564?w=100&h=100&fit=crop&q=80"
        };

        const CONTACTS = [
            { id: 1, name: "Мария", avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=60&h=60&fit=crop&q=80" },
            { id: 2, name: "Dev Team", avatar: "https://images.unsplash.com/photo-1526045612217-b7bdf4de5c11?w=60&h=60&fit=crop&q=80" },
            { id: 3, name: "Product", avatar: "https://images.unsplash.com/photo-1529156069898-49974e94b2f5?w=60&h=60&fit=crop&q=80" },
            { id: 4, name: "Design Group", avatar: "https://images.unsplash.com/photo-1531427186611-ecfd6d936f79?w=60&h=60&fit=crop&q=80" },
            { id: 5, name: "Client X", avatar: "https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?w=60&h=60&fit=crop&q=80" },
        ];

        const INITIAL_MESSAGES = {
            1: [{ id: 1, text: "Привет! Как продвигается дизайн?", senderId: 1, time: "14:30" }],
            2: [{ id: 2, text: "Добро пожаловать на новую платформу!", senderId: 2, time: "Вчера" }]
        };

        const INITIAL_POSTS = [
            { 
                id: 1, 
                userId: CURRENT_USER.id, 
                userAvatar: CURRENT_USER.avatar, 
                userName: CURRENT_USER.name, 
                content: "Только что увидел новый концепт интерфейса. Невероятно чистый и современный дизайн с использованием glassmorphism. 🔥",
                likes: 12, 
                image: "https://images.unsplash.com/photo-1618005182384-a86a9d868f13?w=600&h=400&fit=crop&q=80",
                time: "2 часа назад"
            },
            { 
                id: 2, 
                userId: 2, 
                userAvatar: CONTACTS[1].avatar, 
                userName: CONTACTS[1].name, 
                content: "Работаю над новым проектом по React. Оказывается, контекст это не только state.",
                likes: 45,
                time: "5 часов назад"
            },
             { 
                id: 3, 
                userId: 2, 
                userAvatar: CONTACTS[1].avatar, 
                userName: CONTACTS[1].name, 
                content: "Пару советов по работе с Tailwind CSS для продакшна. Важно не забыть оптимизировать конфиг.",
                likes: 89,
                time: "Вчера"
            }
        ];

        // --- COMPONENTS ---

        const Icon = ({ name, size = 20, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        // ==================== MESSENGER TAB ====================
        
        const ChatList = ({ selectedId, onSelect }) => (
            <div className="h-full flex flex-col p-3 space-y-2">
                {CONTACTS.map(contact => (
                    <button 
                        key={contact.id}
                        onClick={() => onSelect(contact.id)}
                        className={`w-full flex items-center gap-4 p-3 rounded-xl transition-all duration-200 group ${selectedId === contact.id ? 'bg-white/10 shadow-inner' : 'hover:bg-white/5'}`}
                    >
                        <div className="relative">
                            <img src={contact.avatar} alt="" className="w-12 h-12 rounded-full object-cover border border-white/20" />
                            {selectedId === contact.id && (
                                <span className="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-green-400 rounded-full border-2 border-darkbg"></span>
                            )}
                        </div>
                        <div className="flex-1 text-left">
                            <h3 className={`font-medium ${selectedId === contact.id ? 'text-white' : 'text-gray-300'}`}>{contact.name}</h3>
                            <p className="text-xs text-muted truncate mt-1 opacity-80 group-hover:opacity-100 transition-opacity">
                                {INITIAL_MESSAGES[contact.id][0] && INITIAL_MESSAGES[contact.id][0].senderId === 2 ? "Они пишут..." : "Нажмите для чата..."}
                            </p>
                        </div>
                    </button>
                ))}
            </div>
        );

        const ChatWindow = ({ chatId, onBack }) => {
            const [inputText, setInputText] = useState("");
            
            // Get messages for current chat
            const msgs = INITIAL_MESSAGES[chatId] || [];
            const lastMsg = msgs[msgs.length - 1];
            const isOnline = Math.random() > 0.5;

            const handleSend = () => {
                if (!inputText.trim()) return;
                const newMsg = { 
                    id: Date.now(), 
                    text: inputText, 
                    senderId: CURRENT_USER.id, // Current user sends first
                    time: "Только что" 
                };
                
                // Update mock state (in real app would use reducer/state setter)
                INITIAL_MESSAGES[chatId].push(newMsg);
                setInputText("");
            }

            return (
                <div className="flex flex-col h-full bg-darkbg/50 relative">
                    {/* Header */}
                    <div className="h-16 glass-header border-b border-white/5 flex items-center px-4 justify-between shrink-0 z-10">
                        <button onClick={onBack} className="p-2 hover:bg-white/10 rounded-full transition-colors">
                            <Icon name="arrow-left" />
                        </button>
                        <div className="flex items-center gap-3">
                             {/* Статус */}
                             <span className={`text-[10px] px-2 py-0.5 rounded-full border ${isOnline ? 'bg-green-400/10 text-green-400 border-green-400' : 'bg-gray-500/10 text-gray-400'}`}>
                                {isOnline ? 'В сети' : 'Не в сети'}
                             </span>
                        </div>
                    </div>

                    {/* Messages Area */}
                    <div className="flex-1 overflow-y-auto p-4 space-y-3">
                         {/* Пример истории */}
                         {msgs.length === 0 && (
                             <div className="flex flex-col items-center justify-center h-full text-gray-500 gap-2 opacity-60">
                                <Icon name="message-circle" size={48} />
                                <p>Начните разговор</p>
                             </div>
                         )}

                        {msgs.map((msg, idx) => (
                            <div 
                                key={idx} 
                                className={`flex flex-col ${msg.senderId === CURRENT_USER.id ? 'items-end' : 'items-start'} animate-enter`}
                                style={{ animationDelay: `${(msgs.indexOf(msg)+1)*50}ms` }}
                            >
                                <div 
                                    className={`px-4 py-2 max-w-[80%] rounded-2xl text-sm shadow-md ${msg.senderId === CURRENT_USER.id ? 'bg-indigo-600 rounded-tr-none' : 'bg-zinc-700 rounded-tl-none'}`}
                                >
                                    {msg.text}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Input */}
                    <div className="p-4 shrink-0 bg-gradient-to-b from-darkbg/90 to-darkbg relative z-10">
                        <form 
                            onSubmit={(e) => { e.preventDefault(); handleSend() }}
                            className={`flex items-center gap-3 p-2 rounded-full border ${inputText ? 'bg-zinc-800' : 'bg-white/5 border-transparent'}`}
                        >
                             <Icon name="smile" size={16} className="text-muted cursor-pointer" />
                             <input 
                                type="text" 
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                placeholder="Написать сообщение..." 
                                className="bg-transparent flex-1 outline-none text-white placeholder:text-muted/60 px-2 max-w-[400px] h-full focus:bg-zinc-800/50 transition-colors"
                             />
                             <button type="submit" disabled={!inputText.trim()} className={`p-3 rounded-full transition-all ${inputText ? 'bg-indigo-500 text-white hover:bg-indigo-400' : 'text-muted opacity-50 cursor-default'}`}>
                                <Icon name="send" size={18} />
                             </button>
                        </form>
                    </div>
                </div>
            );
        };

        const MessengerView = ({ activeTab, setActiveTab }) => {
             // Простой бэкенд для переключения чатов
             const [selectedChatId, setSelectedChatId] = useState(1);

            return (
                <div className="w-full h-full flex">
                    {/* Left Sidebar */}
                    <div className={`w-80 hidden md:flex flex-col border-r border-white/5 ${activeTab === 'messenger' ? 'flex' : 'hidden'} bg-black/40`}>
                         <ChatList 
                             selectedId={selectedChatId} 
                             onSelect={setSelectedChatId} 
                         />
                    </div>

                    {/* Main Chat Area */}
                    <div className="flex-1 flex justify-center">
                        {activeTab === 'messenger' ? (
                            <>
                                {selectedChatId ? (
                                    <ChatWindow chatId={selectedChatId} onBack={() => setSelectedChatId(null)} />
                                ) : (
                                    <div className="w-full h-full flex items-center justify-center p-8">
                                        <div className="text-center">
                                            <h2 className="text-xl font-light text-white mb-4 accent-text">Выберите чат, чтобы начать общение</h2>
                                            <p className="text-muted/50">Интерфейс Telegram-style</p>
                                        </div>
                                    </div>
                                )}
                            </>
                        ) : (
                             // Placeholder for Feed when viewing Messenger side by side on desktop or if we want to toggle
                             <div className="w-full h-full flex items-center justify-center text-muted/30">
                                 <Icon name="layout-sidebar" />
                             </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==================== FEED TAB ====================

        const Post = ({ data }) => (
             <div className="mb-6 p-4 rounded-3xl bg-zinc-800/50 hover:bg-zinc-800/80 transition-colors border border-white/5 animate-enter">
                {/* Header */}
                <div className="flex gap-4 mb-3">
                    <img src={data.userAvatar} alt="" className="w-12 h-12 rounded-full object-cover ring-2 ring-transparent hover:ring-indigo-500/50 transition-all cursor-pointer" />
                    <div>
                        <h4 className="font-semibold text-sm flex items-center gap-2">
                            {data.userName} 
                            <span className="text-xs text-muted bg-white/10 px-1.5 py-0.5 rounded-md border border-white/10">Pro</span>
                        </h4>
                        <span className="text-xs text-muted">{data.time}</span>
                    </div>
                </div>

                {/* Content */}
                <p className="mb-3 leading-relaxed text-gray-200 whitespace-pre-wrap">{data.content}</p>

                {data.image && (
                     <div className="w-full h-[250px] mb-3 rounded-xl overflow-hidden relative group">
                        <img src={data.image} alt="" className="w-full h-full object-cover" />
                     </div>
                )}

                {/* Actions */}
                <div className="flex items-center gap-6 border-t border-white/5 pt-3 mt-2">
                    <button 
                        onClick={() => {
                            // Increment logic (simple local update)
                            data.likes++; 
                        }}
                        className="flex items-center gap-1.5 text-sm group"
                    >
                         <div className={`p-2 rounded-lg transition-all ${data.likes % 2 === 0 ? 'bg-pink-500/10 text-pink-500' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>
                             <Icon name="heart" size={18} fill={data.likes > 0 ? "currentColor" : "none"} />
                         </div>
                         <span className={`font-medium ${data.likes > 0 ? 'text-pink-400' : ''}`}>{data.likes}</span>
                    </button>
                    
                    <button className="flex items-center gap-1.5 text-sm group">
                        <div className="p-2 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                            <Icon name="message-circle" size={18} />
                        </div>
                         <span className="text-gray-400 group-hover:text-white transition-colors">3</span>
                    </button>
                </div>
            </div>
        );

        const FeedView = () => (
            <div className="w-full h-full flex flex-col bg-gradient-to-b from-zinc-950 via-zinc-950 to-black/40 relative">
                
                {/* Top Profile Section */}
                <div className="p-6 pb-2 border-b border-white/5 flex justify-between items-center backdrop-blur-sm sticky top-0 z-10 glass-header rounded-b-[3rem]">
                    <div className="flex gap-4">
                        <img src={CURRENT_USER.avatar} alt="" className="w-14 h-14 rounded-full border-2 border-white/10 object-cover" />
                        <div>
                            <h2 className="text-lg font-bold">{CURRENT_USER.name}</h2>
                            <p className="text-sm text-muted">Мини-проект React + Tailwind</p>
                        </div>
                    </div>
                    <button className="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
                         <Icon name="settings" size={18} />
                    </button>
                </div>

                {/* Create Post */}
                <div className="p-4 border-b border-white/5 bg-black/30 backdrop-blur-xl sticky top-[7rem] z-20">
                     <form 
                        onSubmit={(e) => { e.preventDefault(); alert('Пост отправлен (MVP)'); }}
                        className="flex gap-3"
                    >
                         <img src={CURRENT_USER.avatar} alt="" className="w-10 h-10 rounded-full object-cover hidden sm:block" />
                         <div className="flex-1">
                            <textarea 
                                placeholder="Что нового?" 
                                rows={2}
                                className="w-full bg-zinc-800/50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500/50 outline-none resize-none transition-all"
                            ></textarea>
                         </div>
                         <button type="submit" className="bg-white text-black font-medium px-4 py-1.5 rounded-lg hover:bg-gray-200 transition-colors">
                             Опубликовать
                         </button>
                    </form>
                </div>

                {/* Feed Stream */}
                <div className="flex-1 overflow-y-auto p-4 sm:p-6 pt-2">
                     {INITIAL_POSTS.map(post => (
                         <Post key={post.id} data={post} />
                     ))}
                     
                     {/* Infinite scroll placeholder */}
                     <div className="py-8 flex justify-center">
                        <div className="animate-pulse w-8 h-8 rounded-full border-4 border-indigo-500/30 border-t-indigo-500"></div>
                     </div>
                </div>

            </div>
        );

        // ==================== MAIN APP CONTAINER ====================
        
        const App = () => {
             const [activeTab, setActiveTab] = useState('messenger');

             return (
                 <div className="flex flex-col h-full w-full relative">
                     {/* Header / Nav Tabs */}
                     <header className="h-16 px-4 sm:px-8 flex items-center justify-between z-50 shrink-0">
                         <div className="text-xl font-semibold tracking-tight text-white/90">
                             Hybrid<span className="accent-text">Social</span>
                         </div>
                         
                         {/* Tab Switcher (Desktop/Tablet Pill) */}
                         <div className="flex bg-zinc-900 rounded-full p-1 border border-white/5 shadow-lg backdrop-blur-md">
                            <button 
                                onClick={() => setActiveTab('messenger')}
                                className={`px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-300 ${activeTab === 'messenger' ? 'bg-zinc-700 text-white shadow' : 'text-gray-400 hover:text-white'}`}
                            >
                                Чаты
                            </button>
                            <div className="w-[1px] h-5 bg-black/30 mx-1"></div>
                            <button 
                                onClick={() => setActiveTab('feed')}
                                className={`px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-300 ${activeTab === 'feed' ? 'bg-zinc-700 text-white shadow' : 'text-gray-400 hover:text-white'}`}
                            >
                                Лента
                            </button>
                         </div>

                         {/* User Mini Avatar (Right top corner) */}
                         <img 
                            src={CURRENT_USER.avatar} 
                            onClick={() => setActiveTab(activeTab === 'feed' ? 'messenger' : activeTab)}
                            className="w-8 h-8 rounded-full cursor-pointer border border-white/20 hover:scale-110 transition-transform" 
                         />
                     </header>

                     {/* Dynamic Content Area */}
                     <main className="flex-1 relative overflow-hidden">
                        {activeTab === 'messenger' && (
                            <MessengerView activeTab={activeTab} setActiveTab={setActiveTab} />
                        )}
                        
                        {activeTab === 'feed' && (
                            <FeedView />
                        )}
                     </main>

                     {/* Mobile Bottom Nav (Only visible if needed, but here header works well enough for MVP) */}
                     <div className="h-12 flex justify-around items-center px-4 sm:hidden border-t border-white/5 bg-zinc-950">
                        {['messenger', 'feed'].map((tab) => (
                             <button 
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                className={`p-2 rounded-xl transition-colors ${activeTab === tab ? 'text-indigo-400' : 'text-gray-500'}`}
                             >
                                 {tab === 'messenger' && <Icon name="message-circle" size={24} />}
                                 {tab === 'feed' && <Icon name="users" size={24} />}
                             </button>
                        ))}
                     </div>
                 </div>
             );
        };

        // Render to DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
